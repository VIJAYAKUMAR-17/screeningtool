services:
  postgres:
    image: postgres:16
    container_name: sanctions-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanctions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sanctions"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
